<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Python Blockly Tanuló</title>

<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<script src="https://unpkg.com/blockly/python.js"></script>
<script src="https://unpkg.com/blockly/msg/hu.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

header {
    height: 50px;
    background: #2e7d32;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
}

#container {
    display: flex;
    height: calc(100% - 50px);
}

/* 🔥 EZ A LÉNYEG: FULL MAGASSÁG */
#blocklyDiv {
    height: 100%;
    width: 70%;
}

#side {
    width: 30%;
    display: flex;
    flex-direction: column;
    background: white;
    border-left: 2px solid #ccc;
}

button {
    margin: 8px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
}

#genBtn { background: #2e7d32; color: white; }
#copyBtn { background: #1976d2; color: white; }
#clearBtn { background: #d32f2f; color: white; }

pre {
    flex: 1;
    margin: 10px;
    padding: 10px;
    background: #111;
    color: #00ff99;
    overflow: auto;
    font-size: 13px;
}
</style>
</head>

<body>

<header>🐍 Python Blockly Tanuló</header>

<div id="container">

<div id="blocklyDiv"></div>

<div id="side">

<button id="genBtn" onclick="generate()">🐍 Python generálás</button>
<button id="copyBtn" onclick="copyCode()">📋 Másolás</button>
<button id="clearBtn" onclick="clearAll()">🗑 Törlés</button>

<pre id="output">// ide jön a Python kód</pre>

</div>

</div>

<!-- TOOLBOX -->
<xml id="toolbox" style="display:none">

<category name="🔁 Ciklus" colour="120">
    <block type="controls_repeat_ext"></block>
    <block type="controls_whileUntil"></block>
</category>

<category name="❓ Feltétel" colour="210">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
</category>

<category name="🔢 Matematika" colour="230">
    <block type="math_number"></block>
    <block type="math_arithmetic"></block>
</category>

<category name="💬 Szöveg" colour="160">
    <block type="text"></block>
    <block type="text_print"></block>
</category>

<category name="📦 Változó" custom="VARIABLE" colour="330"></category>

<category name="⌨️ Bemenet">
    <block type="ask_input"></block>
</category>

</xml>

<script>

// 🔵 input blokk
Blockly.defineBlocksWithJsonArray([
{
  "type": "ask_input",
  "message0": "kérdezd meg: %1",
  "args0": [
    {
      "type": "field_input",
      "name": "TEXT",
      "text": "Mi a neved?"
    }
  ],
  "output": "String",
  "colour": 20
}
]);

Blockly.Python['ask_input'] = function(block) {
  const text = block.getFieldValue('TEXT');
  return [`input("${text}: ")`, Blockly.Python.ORDER_ATOMIC];
};

Blockly.Python['text_print'] = function(block) {
  const msg = Blockly.Python.valueToCode(block, 'TEXT', Blockly.Python.ORDER_NONE) || "''";
  return `print(${msg})\n`;
};

// 🧠 workspace
const workspace = Blockly.inject('blocklyDiv', {
    toolbox: document.getElementById('toolbox'),
    trashcan: true,
    zoom: {
        controls: true,
        wheel: true
    }
});

// 🐍 generálás
function generate() {
    const code = Blockly.Python.workspaceToCode(workspace);
    document.getElementById("output").textContent = code;
}

// 📋 másolás
function copyCode() {
    navigator.clipboard.writeText(document.getElementById("output").textContent);
    alert("Kimásolva!");
}

// 🗑 törlés
function clearAll() {
    workspace.clear();
    document.getElementById("output").textContent = "";
}

</script>

</body>
</html>
